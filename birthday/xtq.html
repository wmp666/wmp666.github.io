<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐</title>
    <link rel="shortcut icon" href="../avatar.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="birthdayStyle.css">
</head>
<body>
<div class="birthday-container">
    <div class="birthday-card">
        <div class="birthday-icon">🐺</div>

        <!-- 仅在目标日期显示的内容 -->
        <div id="special-content" class="hidden-message">
            <h1 class="gradientText">生日快乐</h1>
            <div class="birthday-text-card">
                <p>
                    作为你的朋友，<br>
                    我有一点比较抱歉，<br>
                    我对于你所爱好的领域不太了解，<br>
                    不知道还该说些什么，<br>
                    所以就祝你生日快乐=）
                </p>
            </div>
        </div>

        <!-- 非目标日期显示的内容 -->
        <div id="normal-message" class="hidden-message">
            <h1 class="gradientText">你来的还不是时候</h1>
            <p class="tagline" style="font-size: 1.2rem; margin-top: 20px;">远征的狼，这里还无法为你留下暂歇的空位，晚点再来吧！</p>
        </div>

        <div class="date-check" id="edit-date">
            <i class="fas fa-calendar-alt"></i> 编写时间：2026年4月11日
        </div>

        <a href="../index.html" class="back-home-link">
            <i class="fas fa-arrow-left"></i> 返回主页
        </a>
    </div>
</div>

<script src="lunarCalendar.js"></script>
<script src="checkDate.js"></script>
<script>
    // 页面加载时检查日期（目标日期：6月24日，公历）
    checkDate(6, 24, false);
</script>
</body>
</html>
