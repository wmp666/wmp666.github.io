<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wmp666的个人主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-title">
    <span class="blue-text">wmp666</span>的个人主页
</header>

<aside id="sidebar" class="sidebar">
    <nav class="sidebar-nav">
        <div class="sidebar-header">
            <h3><i class="fas fa-bars"></i> 菜单</h3>
            <button class="close-sidebar" id="close-sidebar">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <ul class="nav-list">
            <li><a href="#" class="nav-item active" data-page="home">
                <i class="fas fa-user"></i>
                <span>个人主页</span>
            </a></li>
            <li><a href="#" class="nav-item" data-page="projects">
                <i class="fas fa-gamepad"></i>
                <span>小玩意儿</span>
            </a></li>
            <li><a href="#" class="nav-item" id="secret-link">
                <i class="fas fa-question-circle"></i>
                <span>???</span>
            </a></li>
        </ul>
        <div class="sidebar-footer">
            <p>© 2026-现在 wmp666</p>
        </div>
    </nav>
</aside>

<button class="menu-toggle" id="menu-toggle">
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
</button>

<main id="content">
    <section class="intro-section active">
        <div class="intro-card">
            <div class="avatar-container">
                <img src="avatar.png" alt="头像" class="avatar">
                <div class="avatar-ring"></div>
            </div>
            <h1 class="name blue-text"></h1>
            <p class="tagline"></p>
            <div class="social-icons">
                <a href="https://github.com/wmp666" target="_blank" class="social-icon" title="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://space.bilibili.com" target="_blank" class="social-icon" title="哔哩哔哩：没有名字的命名牌">
                    <i class="fab fa-bilibili"></i>
                </a>
                <a href="#" class="social-icon" title="邮箱">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
        </div>
    </section>

    <section class="projects-section">
        <div class="section-header">
            <h2><i class="fas fa-gamepad"></i> 小玩意儿</h2>
            <p>这里是我的一些趣味项目和工具</p>
        </div>
        <div class="projects-grid">
            <div class="project-card">
                <div class="project-icon">
                    <i class="fas fa-puzzle-piece"></i>
                </div>
                <h3>班级工具</h3>
                <p>用于高效管理班级</p>
                <p class="project-warning">
                    目前因测试班级下线，暂停更新</p>
                <a href="https://github.com/wmp666/ClassTools_JDK25" class="project-link">
                    查看详情 <i class="fas fa-arrow-right"></i>
                </a>
            </div>
            <div class="project-card">
                <div class="project-icon">
                    <i class="fas fa-lightbulb"></i>
                </div>
                <h3>磨刀石</h3>
                <p>班级工具的衍生物，获取搭配上班级工具的课表会有意想不到的效果</p>
                <p class="project-warning">
                    目前没有提供安装包，使用需要自行编译</p>
                <a href="https://github.com/wmp666/Whetstone" class="project-link">
                    查看详情 <i class="fas fa-arrow-right"></i>
                </a>
            </div>
            <div class="project-card">
                <div class="project-icon">
                    <i class="fas fa-rocket"></i>
                </div>
                <h3>Scratch项目</h3>
                <p>用Scratch/TurboWarp开发的各种小游戏小游戏</p>
                <a href="https://github.com/wmp666/Scratch" class="project-link">
                    查看详情 <i class="fas fa-arrow-right"></i>
                </a>
            </div>
        </div>
    </section>
</main>

<div id="password-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-lock"></i> 访问验证</h3>
            <button class="close-modal"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <p>请输入访问码以继续</p>
            <div class="input-group">
                <input type="password" id="access-code" placeholder="输入访问码">
                <button id="submit-code" class="blue-btn">
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
            <p id="error-msg" class="error-msg">
                <i class="fas fa-exclamation-circle"></i> 访问码错误，请重试
            </p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
